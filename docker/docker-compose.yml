services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recruit_db
    ports:
      - "5433:5432"  # 5433 to avoid conflict with other PostgreSQL on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/recruit_db
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      # Super admin is ensured on startup (see app.seed_admin_service)
      ADMIN_EMAIL: admin@recruit-system.com
      ADMIN_PASSWORD: Admin123!
      ADMIN_NAME: Super Admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api:/app

  frontend:
    build:
      context: ../apps/web
      dockerfile: ../../docker/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Do not set VITE_API_URL here: the browser must use same-origin `/api` so it works for both
      # http://localhost:5173 and http://127.0.0.1:5173. Vite proxies /api → backend (below).
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  pgdata:
