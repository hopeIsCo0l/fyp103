services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-recruit_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 3s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/api
      dockerfile: ../../docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-recruit_db}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      SEED_ADMIN_ON_START: ${SEED_ADMIN_ON_START:-1}
      RUN_ALEMBIC: ${RUN_ALEMBIC:-0}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@recruit-system.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_NAME: ${ADMIN_NAME:-Super Admin}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")"',
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 25s

  frontend:
    build:
      context: ../apps/web
      dockerfile: ../../docker/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Vite dev proxy must reach the API container by service name (not localhost)
      BACKEND_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  pgdata:
