services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recruit_db
    ports:
      - "5433:5432"  # 5433 to avoid conflict with other PostgreSQL on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/recruit_db
      # Reserved for remote scorer wiring: internal URL of the standalone scoring API.
      EA_CV_SCORER_URL: http://cv-similarity-api:8000
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      # Super admin is ensured on startup (see app.seed_admin_service)
      ADMIN_EMAIL: admin@recruit-system.com
      ADMIN_PASSWORD: Admin123!
      ADMIN_NAME: Super Admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api:/app

  cv-similarity-api:
    build:
      context: ../packages/ai-engine/ea-cv-job-matcher
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      SERVING_BACKEND: local
      ROLLOUT_MODE: production
      REGISTRY_PATH: registry/registry.json
      LOG_LEVEL: INFO
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../apps/web
      dockerfile: ../../docker/web.Dockerfile
    ports:
      # Host 5175: lower ports on this machine are reserved; keep Vite's container port at 5173.
      - "5175:5173"
    environment:
      # Do not set VITE_API_URL here: the browser must use same-origin `/api` (e.g. localhost:5174).
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  pgdata:
