[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "recruit-ai-engine"
version = "0.2.0"
description = "EAA Recruit: CV–JD similarity (TF-IDF + cosine), future RAG/XAI"
requires-python = ">=3.11"
dependencies = [
  "scikit-learn>=1.4,<2",
  "numpy>=1.26,<3",
]

[tool.setuptools.packages.find]
where = ["src"]
